# GBEmu configuration
# Lines starting with # or ; are comments.
#
# Examples:
# system = auto   # auto | gb | gbc | gba
# fps = 59.7275   # override target FPS (0 disables pacing)
# scale = 4       # window scale factor
# video_driver = wayland  # wayland | x11
# cpu_trace = true  # enable CPU trace buffer
# boot_trace = true # log when boot ROM is disabled
# headless = false
# headless_frames = 120
# debug_window_overlay = false
# cgb_color_correction = false
# show_help_overlay = false
# input.a = z
# input.b = x
# input.select = \b
# input.start = \r
# input.up = w
# input.down = s
# input.left = a
# input.right = d
# input.right = sdl:1073741903
# input.left = sdl:1073741904
# input.up = sdl:1073741906
# input.down = sdl:1073741905
# boot_rom = firmware/GB/Game-Boy-Boot-ROM.gb  # override boot ROM for current system
# boot_rom_gb = firmware/GB/Game-Boy-Boot-ROM.gb
# boot_rom_gbc = firmware/GBC/Game-Boy-Color-Boot-ROM.gbc
# boot_rom_gba = firmware/GBA/Game-Boy-Advance-Boot-ROM.bin
