# GBEmu configuration
# Lines starting with # or ; are comments.
#
# Examples:
# system = auto   # auto | gb | gbc | gba
# fps = 59.7275   # override target FPS (0 disables pacing)
# scale = 4       # window scale factor
# video_driver = wayland  # wayland | x11
# ui_theme = retro  # retro | minimal | deck
# launcher = true
# rom_dirs = Test-Games;roms
# cpu_trace = true  # enable CPU trace buffer
# boot_trace = true # log when boot ROM is disabled
# gba_trace = false
# gba_trace_steps = 2000
# gba_trace_io = true
# gba_trace_after_rom = false
# gba_unimp_limit = 0
# gba_video_io = 0
# gba_swi_limit = 0
# gba_watchdog_steps = 0
# headless = false
# headless_frames = 120
# debug_window_overlay = false
# cgb_color_correction = false
# gba_color_correction = false
# show_help_overlay = false
# hud = true
# filter = none  # none | scanlines | lcd | crt
# hud_corner = top-left  # top-left | top-right | bottom-left | bottom-right
# hud_compact = false
# hud_timeout = 0  # seconds (0 disables auto-hide)
# input.a = z
# input.b = x
# input.select = \b
# input.start = \r
# input.up = w
# input.down = s
# input.left = a
# input.right = d
# input.right = sdl:1073741903
# input.left = sdl:1073741904
# input.up = sdl:1073741906
# input.down = sdl:1073741905
# pad_axis_deadzone = 16000
# pad.a = button:a
# pad.b = button:b
# pad.select = button:back
# pad.start = button:start
# pad.up = button:dpad_up
# pad.down = button:dpad_down
# pad.left = button:dpad_left
# pad.right = button:dpad_right
# pad.up = axis:lefty-
# pad.down = axis:lefty+
# pad.left = axis:leftx-
# pad.right = axis:leftx+
# boot_rom = firmware/GB/Game-Boy-Boot-ROM.gb  # override boot ROM for current system
# boot_rom_gb = firmware/GB/Game-Boy-Boot-ROM.gb
# boot_rom_gbc = firmware/GBC/Game-Boy-Color-Boot-ROM.gbc
# boot_rom_gba = firmware/GBA/Game-Boy-Advance-Boot-ROM.bin
