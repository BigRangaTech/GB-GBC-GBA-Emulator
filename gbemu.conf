# GBEmu configuration
# Lines starting with # or ; are comments.
#
# Examples:
# system = auto   # auto | gb | gbc | gba
# fps = 59.7275   # override target FPS (0 disables pacing)
# scale = 4       # window scale factor
# video_driver = wayland  # wayland | x11
# boot_rom = firmware/dmg_boot.bin  # override boot ROM for current system
# boot_rom_gb = firmware/dmg_boot.bin
# boot_rom_gbc = firmware/cgb_boot.bin
# boot_rom_gba = firmware/gba_bios.bin
